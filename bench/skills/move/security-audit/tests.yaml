- description: "Audit Insecure Contract"
  vars:
    task: "Perform a comprehensive security audit of this Move smart contract. Identify all vulnerabilities, categorize them by severity (Critical, High, Medium, Low), and provide specific remediation recommendations."
    contractCode: file://../../../fixtures/contracts/insecure-contract.move
  assert:
    - type: javascript
      value: file://../../../assertions/audit-report-check.js
    - type: contains
      value: "access control"
    - type: contains
      value: "ConstructorRef"
    - type: icontains
      value: "critical"

- description: "Audit Secure Contract (False Positive Detection)"
  vars:
    task: "Perform a comprehensive security audit of this Move smart contract. Identify all vulnerabilities, categorize them by severity, and provide remediation recommendations."
    contractCode: file://../../../fixtures/contracts/nft-collection.move
  assert:
    - type: javascript
      value: file://../../../assertions/audit-report-check.js
    - type: not-icontains
      value: "critical vulnerability"
